version: 0.2

env:
  variables:
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing pnpm..."
      - corepack enable
      - corepack prepare pnpm@9.12.3 --activate
      - pnpm config set store-dir .pnpm-store
      - echo "Installing dependencies..."
      - pnpm install --frozen-lockfile

  pre_build:
    commands:
      - echo "Generating Prisma Client..."
      - pnpm prisma:generate

  build:
    commands:
      - echo "Building API and Web applications..."
      - pnpm build

  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - 'apps/api/dist/**/*'
    - 'apps/web/.next/**/*'
    - 'apps/web/public/**/*'
    - 'package.json'
    - 'pnpm-workspace.yaml'
    - 'node_modules/**/*'

cache:
  paths:
    - '.pnpm-store/**/*'