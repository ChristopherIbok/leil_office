version: 0.2

env:
  variables:
    NODE_ENV: "production"
  # These must be set in CodeBuild environment or AWS Secrets Manager:
  # DATABASE_URL, JWT_SECRET, ECR_REPOSITORY_URL, AWS_REGION
  parameter-store:
    DATABASE_URL: "/leilportal/DATABASE_URL"
    JWT_SECRET: "/leilportal/JWT_SECRET"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Enabling pnpm via corepack..."
      - corepack enable
      - corepack prepare pnpm@9.12.3 --activate
      - echo "Installing dependencies..."
      - pnpm install --frozen-lockfile

  pre_build:
    commands:
      - echo "Generating Prisma Client..."
      - pnpm prisma:generate
      - echo "Logging into Amazon ECR..."
      - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPOSITORY_URL

  build:
    commands:
      - echo "Building API Docker image..."
      - docker build -t $ECR_REPOSITORY_URL:latest -t $ECR_REPOSITORY_URL:$CODEBUILD_RESOLVED_SOURCE_VERSION -f apps/api/Dockerfile .
      - echo "Building Frontend..."
      - NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL pnpm --filter @leilportal/web build

  post_build:
    commands:
      - echo "Pushing API image to ECR..."
      - docker push $ECR_REPOSITORY_URL:latest
      - docker push $ECR_REPOSITORY_URL:$CODEBUILD_RESOLVED_SOURCE_VERSION

artifacts:
  files:
    - 'apps/web/.next/**/*'
    - 'apps/web/public/**/*'
    - 'apps/web/package.json'
    - 'package.json'
    - 'pnpm-workspace.yaml'
    - 'pnpm-lock.yaml'

cache:
  paths:
    - '/root/.local/share/pnpm/store/**/*'
