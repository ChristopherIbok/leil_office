version: 0.2

env:
  variables:
    NODE_ENV: "production"
    DATABASE_URL: "postgresql://johndoe:randompassword@localhost:5432/mydb?schema=public"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci

  pre_build:
    commands:
      - echo "Generating Prisma Client..."
      - npm run prisma:generate

  build:
    commands:
      - echo "Building Backend..."
      - npm run build -w @leilportal/api
      - echo "Building Frontend..."
      - npm run build -w @leilportal/web

  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - 'apps/api/dist/**/*'
    - 'apps/web/.next/**/*' 
    - 'apps/web/public/**/*'
    - 'package.json'
    - 'package-lock.json'
    - 'apps/web/package.json'

cache:
  paths:
    - '~/.npm/**/*'