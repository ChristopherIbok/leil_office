```yaml
version: 0.2

env:
  variables:
    NODE_ENV: production
    BUILD_DIR: dist
  parameter-store:
    # Add your parameter store references here if needed

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - cd app && npm ci --only=production

  pre_build:
    commands:
      - echo "Running pre-build steps..."
      - cd app && npm run lint || true  # Continue even if linting fails
      - cd app && npm test || true      # Continue even if tests fail

  build:
    commands:
      - echo "Building application..."
      - cd app && npm run build
      - echo "Build completed successfully"

  post_build:
    commands:
      - echo "Running post-build steps..."
      - echo "Creating deployment package..."
      - cd app && tar -czf ../build-output.tar.gz -C $BUILD_DIR .
      - echo "Build completed on $(date)"

artifacts:
  files:
    - build-output.tar.gz
  discard-paths: yes

cache:
  paths:
    - app/node_modules/**/*
```

