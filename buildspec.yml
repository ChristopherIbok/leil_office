version: 0.2

env:
  variables:
    NODE_ENV: "production"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing pnpm..."
      - corepack enable
      - corepack prepare pnpm@9.12.3 --activate
      - pnpm config set store-dir $(pwd)/.pnpm-store
      - echo "Installing dependencies at root..."
      - pnpm install --frozen-lockfile --prefer-offline

  pre_build:
    commands:
      - echo "Generating Prisma Client..."
      # Ensure we are at the root so pnpm finds the workspace
      - pnpm prisma:generate

  build:
    commands:
      - echo "Building Backend..."
      - pnpm --filter @leilportal/api build
      - echo "Building Frontend..."
      - pnpm --filter @leilportal/web build

  post_build:
    commands:
      - echo "Build completed on `date`"

artifacts:
  files:
    - 'apps/api/dist/**/*'
    - 'apps/web/.next/**/*' 
    - 'apps/web/public/**/*'
    - 'package.json'
    - 'pnpm-workspace.yaml'
    - 'apps/web/package.json'

cache:
  paths:
    - '.pnpm-store/**/*'