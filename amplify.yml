version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        # Provide a dummy URL to prevent Prisma from failing during generation
        - export DATABASE_URL="postgresql://localhost:5432"
        - npm run prisma:generate
    build:
      commands:
        - NEXT_PUBLIC_API_URL=$API_URL npm run build -w @leilportal/web
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - apps/web/.next/cache/**/*