version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pwd && ls -la
    build:
      commands:
        - pwd && ls -la
        - ls apps/web && cd apps/web && pnpm run build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - '**/node_modules/**'