version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - ls -la
    build:
      commands:
        - if [ -d "leil_office" ]; then cd leil_office; fi
        - pnpm --filter @leilportal/web build
  artifacts:
    baseDirectory: leil_office/apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - '*/.next/cache/**/*'