version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - cd apps/web && pnpm install
    build:
      commands:
        - cd apps/web && pnpm run build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - apps/web/node_modules/**/*
      - apps/web/.next/cache/**/*