version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@9.12.3 --activate
        - pnpm install --frozen-lockfile
        - export DATABASE_URL="postgresql://localhost:5432/dummy"
        - pnpm prisma:generate
    build:
      commands:
        - NEXT_PUBLIC_API_URL=$API_URL pnpm --filter @leilportal/web build
  artifacts:
    baseDirectory: apps/web
    files:
      - '**/*'
  cache:
    paths:
      - apps/web/.next/cache/**/*
      - /root/.local/share/pnpm/store/**/*
