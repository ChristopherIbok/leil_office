version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - cd leil_office && pnpm install --filter @leilportal/web
    build:
      commands:
        - cd leil_office/apps/web && pnpm run build
  artifacts:
    baseDirectory: leil_office/apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - '**/node_modules/**'