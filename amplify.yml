version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@9.12.3 --activate
        - pnpm config set store-dir $(pwd)/.pnpm-store
        - pnpm install --frozen-lockfile
        - pnpm prisma:generate
    build:
      commands:
        - pnpm --filter @leilportal/web build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
      - apps/web/.next/cache/**/*