version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install --frozen-lockfile --filter @leilportal/web
    build:
      commands:
        - pnpm --filter @leilportal/web build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - apps/web/node_modules/**/*
      - apps/web/.next/cache/**/*
apps:
  - appRoot: apps/web
    build: pnpm run build
    start: pnpm run start