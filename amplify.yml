version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - REPO_DIR=$(ls -d */ | head -1) && cd $REPO_DIR && pnpm install
    build:
      commands:
        - REPO_DIR=$(ls -d */ | head -1) && cd $REPO_DIR && pnpm --filter @leilportal/web build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/web/.next/cache/**/*
      - apps/web/node_modules/**/*