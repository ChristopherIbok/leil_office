apiVersion: apps/v1
kind: Deployment
metadata:
  name: leilportal-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: leilportal-api
  template:
    metadata:
      labels:
        app: leilportal-api
    spec:
      containers:
        - name: api
          image: leilportal/api:0.1.0
          ports:
            - containerPort: 4000
          envFrom:
            - secretRef:
                name: leilportal-api-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: leilportal-api
spec:
  selector:
    app: leilportal-api
  ports:
    - port: 4000
      targetPort: 4000
